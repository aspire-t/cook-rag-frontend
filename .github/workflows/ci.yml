name: Frontend CI

on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - '.github/workflows/cd.yml'
  pull_request:
    branches: [main]
    paths-ignore:
      - '**.md'

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Run tests
        run: npm run test:run

      - name: Build H5
        run: npm run build:h5
